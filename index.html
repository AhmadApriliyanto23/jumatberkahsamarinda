<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masjid Jumat Berkah – Peta Interaktif</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ══ TOKENS ══ */
    :root {
      --g-deep:   #1a3a2a;
      --g-mid:    #2d6a4f;
      --g-light:  #52b788;
      --gold:     #c9a84c;
      --gold-lt:  #f0d080;
      --cream:    #faf6ee;
      --cream-dk: #ede8dc;
      --txt:      #1c1c1c;
      --txt-mid:  #4a4a4a;
      --txt-soft: #7a7a6a;
      --r:        12px;
      --r-sm:     7px;
      --sh-md:    0 6px 24px rgba(0,0,0,.16);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--g-deep); color: var(--txt); }

    /* ══ APP SHELL ══ */
    #app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    /* ══ HEADER ══ */
    header {
      background: var(--g-deep);
      border-bottom: 1px solid rgba(201,168,76,.2);
      padding: 0 16px;
      display: flex; align-items: center; gap: 10px;
      z-index: 1200;
    }
    .h-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      border-radius: 50%; display: grid; place-items: center; font-size: 16px;
    }
    .h-text { line-height: 1; }
    .h-title { font-family: 'Playfair Display', serif; font-size: clamp(.88rem,2vw,1.05rem); color: var(--cream); }
    .h-sub   { font-size: .62rem; color: var(--gold-lt); opacity: .78; font-weight: 300; margin-top: 2px; }
    .h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .badge {
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.32);
      color: var(--gold-lt); font-size: .64rem; font-weight: 500;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    }
    .btn-geo {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 20px; border: none; cursor: pointer;
      background: rgba(82,183,136,.14); border: 1px solid rgba(82,183,136,.38);
      color: #7ee8b2; font-family: 'DM Sans', sans-serif; font-size: .66rem; font-weight: 500;
      transition: background .2s, transform .15s; white-space: nowrap;
    }
    .btn-geo:hover { background: rgba(82,183,136,.26); transform: translateY(-1px); }
    .btn-geo:disabled { opacity: .5; pointer-events: none; }
    .btn-geo svg { flex-shrink: 0; }

    /* ══ TOAST ══ */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--g-deep); color: var(--cream); border: 1px solid rgba(201,168,76,.28);
      padding: 9px 18px; border-radius: 20px; font-size: .75rem;
      box-shadow: var(--sh-md); z-index: 9999; transition: transform .3s, opacity .3s; opacity: 0;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ══ BODY GRID — 9:3 ══ */
    #body-grid {
      display: grid;
      grid-template-columns: 3fr 1fr;
      overflow: hidden; min-height: 0;
    }

    /* ══ MAP PANE ══ */
    #map-pane { position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; z-index: 1; }

    .map-legend {
      position: absolute; bottom: 40px; left: 10px; z-index: 800;
      background: rgba(26,58,42,.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(201,168,76,.22); border-radius: var(--r-sm);
      padding: 9px 13px; color: var(--cream); font-size: .65rem; line-height: 1.9;
      pointer-events: none;
    }
    .leg-title { font-family:'Playfair Display',serif; font-size:.72rem; color:var(--gold-lt); margin-bottom:4px; }
    .leg-row   { display:flex; align-items:center; gap:6px; }
    .leg-dot   { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .leg-dot.y { background:#52b788; }
    .leg-dot.n { background:#e05a3a; }

    /* ══ SIDEBAR ══ */
    #sidebar {
      background: var(--cream); border-left: 1px solid rgba(0,0,0,.07);
      display: flex; flex-direction: column; overflow: hidden; min-height: 0;
      z-index: 100;
    }

    .search-wrap {
      padding: 10px 10px 6px; border-bottom: 1px solid var(--cream-dk);
      background: var(--cream); flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1.5px solid var(--cream-dk);
      border-radius: 20px; padding: 6px 11px; transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--g-light); }
    .search-box svg { flex-shrink: 0; color: var(--txt-soft); }
    .search-box input {
      border: none; outline: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: .75rem; color: var(--txt); width: 100%;
    }
    .search-box input::placeholder { color: var(--txt-soft); }
    .search-count { font-size: .62rem; color: var(--txt-soft); margin-top: 5px; padding: 0 2px; }

    #mosque-list {
      overflow-y: auto; flex: 1; padding: 8px;
      display: flex; flex-direction: column; gap: 7px;
      scrollbar-width: thin; scrollbar-color: var(--cream-dk) transparent;
      min-height: 0;
    }
    #mosque-list::-webkit-scrollbar { width: 3px; }
    #mosque-list::-webkit-scrollbar-thumb { background: var(--cream-dk); border-radius: 3px; }

    /* ══ MOSQUE CARD (sidebar) ══ */
    .mosque-card {
      background: #fff; border: 1.5px solid var(--cream-dk); border-radius: var(--r);
      overflow: hidden; cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .mosque-card:hover { border-color: var(--g-light); box-shadow: 0 3px 12px rgba(45,106,79,.14); transform: translateY(-1px); }
    .mosque-card.active { border-color: var(--g-mid); box-shadow: 0 3px 16px rgba(45,106,79,.22); }

    .mc-img { height: 82px; position: relative; overflow: hidden; background: var(--cream-dk); }
    .mc-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .mc-ph {
      width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:3px;
      background:linear-gradient(160deg,var(--g-mid),var(--g-deep));
      color:rgba(255,255,255,.4); font-size:.6rem;
    }
    .mc-ph span { font-size:1.5rem; }
    .mc-tag {
      position:absolute; top:6px; right:6px;
      padding:2px 7px; border-radius:20px;
      font-size:.55rem; font-weight:600; backdrop-filter:blur(8px);
    }
    .mc-tag.yes { background:rgba(30,80,50,.85); color:#9eefba; border:1px solid rgba(160,255,180,.22); }
    .mc-tag.no  { background:rgba(80,30,15,.85); color:#f0b898; border:1px solid rgba(255,170,120,.22); }
    .mc-body { padding: 8px 9px 9px; }
    .mc-name {
      font-family:'Playfair Display',serif; font-size:.75rem; color:var(--g-deep);
      line-height:1.3; margin-bottom:2px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .mc-addr {
      font-size:.6rem; color:var(--txt-soft); line-height:1.4; margin-bottom:7px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .mc-btn-row { display:flex; gap:5px; }
    .mc-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
      padding:5px 4px; border:none; border-radius:var(--r-sm);
      font-family:'DM Sans',sans-serif; font-size:.62rem; font-weight:500;
      cursor:pointer; text-decoration:none; transition:filter .2s, transform .15s;
    }
    .mc-btn-loc { background:linear-gradient(135deg,var(--g-mid),var(--g-deep)); color:#fff; }
    .mc-btn-loc:hover { filter:brightness(1.14); transform:translateY(-1px); }

    .no-results { text-align:center; padding:28px 12px; color:var(--txt-soft); font-size:.76rem; }
    .no-results span { font-size:1.8rem; display:block; margin-bottom:7px; }

    /* ══ POPUP ══ */
    .leaflet-popup-content-wrapper {
      background:transparent !important; border:none !important;
      box-shadow:none !important; padding:0 !important; border-radius:0 !important;
    }
    .leaflet-popup-tip-container { display:none; }
    .leaflet-popup-content { margin:0 !important; width:auto !important; }

    .popup-card {
      width: min(265px, 86vw);
      background: var(--cream); border-radius: var(--r);
      overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.22);
      animation: popIn .22s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn { from{opacity:0;transform:translateY(8px) scale(.96)} to{opacity:1;transform:none} }

    .pc-img { height: 118px; position:relative; overflow:hidden; background:var(--cream-dk); }
    .pc-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .pc-img-ph {
      width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:5px;
      background:linear-gradient(160deg,var(--g-mid),var(--g-deep));
      color:rgba(255,255,255,.45); font-size:.7rem;
    }
    .pc-img-ph span { font-size:2rem; }
    .pc-badge {
      position:absolute; top:8px; right:8px;
      padding:3px 9px; border-radius:20px;
      font-size:.58rem; font-weight:600; backdrop-filter:blur(8px);
    }
    .pc-badge.yes { background:rgba(30,80,50,.88); color:#b2f5cc; border:1px solid rgba(160,255,180,.28); }
    .pc-badge.no  { background:rgba(80,30,15,.88); color:#f5bda0; border:1px solid rgba(255,170,120,.28); }

    .pc-body { padding:11px 12px 12px; }
    .pc-body h2 {
      font-family:'Playfair Display',serif; font-size:.85rem; color:var(--g-deep);
      line-height:1.3; margin-bottom:3px;
    }
    .pc-addr { font-size:.63rem; color:var(--txt-soft); margin-bottom:8px; line-height:1.4; }

    .pc-info {
      display:flex; gap:7px; align-items:flex-start;
      background:var(--cream-dk); border-radius:var(--r-sm);
      padding:7px 9px; margin-bottom:9px;
    }
    .pc-info-icon { font-size:.95rem; flex-shrink:0; margin-top:1px; }
    .pc-info-text { font-size:.65rem; color:var(--txt-mid); line-height:1.5; }
    .pc-info-text strong { display:block; font-size:.67rem; color:var(--txt); margin-bottom:2px; }
    .st-yes { color:#2d6a4f; font-weight:600; }
    .st-no  { color:#9a2a1a; font-weight:600; }

    .pc-btn-row { display:flex; gap:5px; }
    .pc-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
      padding:7px 4px; border:none; border-radius:var(--r-sm);
      font-family:'DM Sans',sans-serif; font-size:.64rem; font-weight:500;
      cursor:pointer; text-decoration:none; transition:filter .2s, transform .15s;
    }
    .pc-btn-maps   { background:linear-gradient(135deg,var(--g-mid),var(--g-deep)); color:#fff !important; }
    .pc-btn-maps:hover { filter:brightness(1.13); transform:translateY(-1px); }
    .pc-btn-donate { background:linear-gradient(135deg,#b5451b,#e07848); color:#fff; }
    .pc-btn-donate:hover { filter:brightness(1.13); transform:translateY(-1px); }
    .pc-btn-donate-dis { background:var(--cream-dk); color:var(--txt-soft); cursor:default; pointer-events:none; }

    /* ══ MARKERS ══ */
    .mosque-marker {
      width:36px; height:36px; border-radius:50% 50% 50% 4px;
      transform:rotate(45deg); border:2px solid #fff;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:transform .2s, box-shadow .2s;
    }
    .mosque-marker.has-jumat { background:linear-gradient(135deg,#2d6a4f,#52b788); box-shadow:0 3px 12px rgba(45,106,79,.48); }
    .mosque-marker.no-jumat  { background:linear-gradient(135deg,#9a2a1a,#e05a3a); box-shadow:0 3px 12px rgba(154,42,26,.48); }
    .mosque-marker:hover { transform:rotate(45deg) scale(1.18); }
    .mosque-marker.has-jumat:hover { box-shadow:0 5px 18px rgba(45,106,79,.65); }
    .mosque-marker.no-jumat:hover  { box-shadow:0 5px 18px rgba(154,42,26,.65); }
    .mosque-marker-inner { transform:rotate(-45deg); font-size:16px; line-height:1; }

    /* ══ TOOLTIP ══ */
    .mosque-tooltip {
      background:var(--g-deep) !important; border:1px solid rgba(201,168,76,.32) !important;
      border-radius:8px !important; box-shadow:0 4px 14px rgba(0,0,0,.28) !important;
      padding:6px 11px !important; color:var(--cream) !important;
      font-family:'DM Sans',sans-serif !important; font-size:.7rem !important;
      line-height:1.45 !important; white-space:nowrap !important; pointer-events:none !important;
    }
    .mosque-tooltip::before { display:none !important; }
    .tt-name { font-weight:500; display:block; margin-bottom:2px; }
    .tt-yes  { color:#7ee8a2; font-size:.63rem; }
    .tt-no   { color:#f0a08a; font-size:.63rem; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      #body-grid { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      #sidebar { max-height: 40vh; border-left: none; border-top: 2px solid rgba(201,168,76,.18); }
      #mosque-list { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; padding: 6px 8px; }
      .mosque-card { min-width: 175px; flex-shrink: 0; }
      .map-legend { display: none; }
    }
    @media (max-width: 480px) {
      header { padding: 0 10px; gap: 8px; }
      .h-sub, .badge { display: none; }
      .btn-geo span { display: none; }
      .btn-geo { padding: 6px 8px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="h-icon">🕌</div>
    <div class="h-text">
      <div class="h-title">Masjid &amp; Jumat Berkah</div>
      <div class="h-sub">Peta Interaktif Masjid Indonesia</div>
    </div>
    <div class="h-right">
      <span class="badge" id="count-badge">—</span>
      <button class="btn-geo" id="btn-geo" onclick="locateUser()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
          <circle cx="12" cy="12" r="8" opacity=".25"/>
        </svg>
        <span>Lokasi Saya</span>
      </button>
    </div>
  </header>

  <!-- BODY GRID (9:3) -->
  <div id="body-grid">

    <!-- GRID 9: MAP -->
    <div id="map-pane">
      <div id="map"></div>
      <div class="map-legend">
        <div class="leg-title">Keterangan</div>
        <div class="leg-row"><span class="leg-dot y"></span> Ada Jumat Berkah</div>
        <div class="leg-row"><span class="leg-dot n"></span> Tidak Ada Jumat Berkah</div>
      </div>
    </div>

    <!-- GRID 3: SIDEBAR -->
    <div id="sidebar">
      <div class="search-wrap">
        <div class="search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Cari nama masjid…"
                 oninput="filterMosques(this.value)" autocomplete="off" />
        </div>
        <div class="search-count" id="search-count"></div>
      </div>
      <div id="mosque-list"></div>
    </div>

  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ══════════════════════════════════════════════════
   DATA — ganti dengan fetch() ke API saat production
   ══════════════════════════════════════════════════ */
const MOSQUE_DATA = [
  {
    id: "masjid_001",
    name: "Masjid Baitul Muttaqien – Islamic Center Kaltim",
    address: "Jl. Slamet Riyadi No.1, Mugirejo, Kec. Sungai Pinang, Kota Samarinda, Kalimantan Timur 75129",
    lat: -0.5023346556441342,
    lng: 117.12009252622154,
    jumat_berkah: true,
    jumat_berkah_time: "11:30 – habis salat Jumat",
    jumat_berkah_note: "Nasi kotak & lauk gratis untuk jamaah dan masyarakat sekitar",
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Islamic_Center_Kalimantan_Timur.jpg/640px-Islamic_Center_Kalimantan_Timur.jpg",
    gmaps_url: "https://maps.google.com/?q=-0.5023346556441342,117.12009252622154",
    apple_maps_url: "https://maps.apple.com/?ll=-0.5023346556441342,117.12009252622154&q=Masjid+Baitul+Muttaqien+-+Islamic+Center+Kaltim"
  },
  {
    id: "masjid_002",
    name: "Masjid Raya Darussalam",
    address: "Jl. Pramuka No.17, Sidodadi, Kec. Samarinda Ulu, Kota Samarinda, Kalimantan Timur 75122",
    lat: -0.5032466442299814,
    lng:  117.14746652195846,
    jumat_berkah: false,
    jumat_berkah_time: null,
    jumat_berkah_note: "Saat ini belum menyelenggarakan program Jumat Berkah",
    photo_url: "",   /* kosong = tampilkan placeholder */
    gmaps_url: "https://maps.google.com/?q=-0.5032466442299814,117.14746652195846",
    apple_maps_url: "https://maps.apple.com/?ll=-0.5032466442299814,117.14746652195846&q=Masjid+Raya+Darussalam+Samarinda"
  },
  {
    id: "masjid_003",
    name: "Masjid Baburrahmah",
    address: "perumahan griya mukti sejatera, Jl. PM. Noor, Sempaja Sel., Kec. Samarinda Utara, Kota Samarinda, Kalimantan Timur 75242",
    lat: -0.45215961,
    lng: 117.1719176,
    jumat_berkah: true,
    jumat_berkah_time: "11:30 – habis salat Jumat",
    jumat_berkah_note: "Nasi kotak & lauk gratis untuk jamaah dan masyarakat sekitar",
    photo_url: "",   /* kosong = tampilkan placeholder */
    gmaps_url: "https://maps.google.com/?q=-0.45215961,117.1719176",
    apple_maps_url: "https://maps.apple.com/?ll=-0.45215961,117.1719176&q=Masjid+Baburrahmah"
  }
];

/* ══════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════ */
const platform = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'ios'
               : /Android/i.test(navigator.userAgent)           ? 'android'
               : 'desktop';

const getMapsUrl = m => platform === 'ios' ? m.apple_maps_url : m.gmaps_url;

function photoMarkup(m, phClass) {
  if (m.photo_url) {
    return `<img src="${m.photo_url}" alt="${m.name}" loading="lazy"
      onerror="this.parentElement.innerHTML='<div class=\\'${phClass}\\'><span>🕌</span><small>Foto tidak tersedia</small></div>'" />`;
  }
  return `<div class="${phClass}"><span>🕌</span><small>Foto belum tersedia</small></div>`;
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

/* ══════════════════════════════════════════════════
   MAP
   ══════════════════════════════════════════════════ */
const map = L.map('map', {
  center: [-0.4820, 117.1490],
  zoom: 14, minZoom: 3, maxZoom: 19,
  zoomControl: false, attributionControl: true
});
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

/* ══════════════════════════════════════════════════
   POPUP HTML
   ══════════════════════════════════════════════════ */
function buildPopupHTML(m) {
  const hasJ = m.jumat_berkah;
  const jumatInfo = hasJ
    ? `<span class="st-yes">✅ Ada – ${m.jumat_berkah_time}</span><br><small>${m.jumat_berkah_note}</small>`
    : `<span class="st-no">🚫 Tidak Ada</span><br><small>${m.jumat_berkah_note}</small>`;

  const mapsLbl = platform === 'ios' ? 'Apple Maps' : 'Google Maps';

  const donateBtn = m.donate_url
    ? `<a href="${m.donate_url}" target="_blank" rel="noopener" class="pc-btn pc-btn-donate">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>Donasi</a>`
    : `<span class="pc-btn pc-btn-donate pc-btn-donate-dis">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>Donasi</span>`;

  return `
  <div class="popup-card">
    <div class="pc-img">
      ${photoMarkup(m, 'pc-img-ph')}
      <span class="pc-badge ${hasJ ? 'yes' : 'no'}">${hasJ ? '✅ Jumat Berkah' : '🚫 Tidak Ada'}</span>
    </div>
    <div class="pc-body">
      <h2>${m.name}</h2>
      <p class="pc-addr">📍 ${m.address}</p>
      <div class="pc-info">
        <span class="pc-info-icon">🍱</span>
        <div class="pc-info-text"><strong>Jumat Berkah</strong>${jumatInfo}</div>
      </div>
      <div class="pc-btn-row">
        <a href="${getMapsUrl(m)}" target="_blank" rel="noopener" class="pc-btn pc-btn-maps">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>${mapsLbl}
        </a>
        ${donateBtn}
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   MARKERS
   ══════════════════════════════════════════════════ */
const markerMap = {};

function createIcon(hasJumat) {
  return L.divIcon({
    className: '',
    html: `<div class="mosque-marker ${hasJumat ? 'has-jumat' : 'no-jumat'}">
             <div class="mosque-marker-inner">🕌</div>
           </div>`,
    iconSize: [36,36], iconAnchor: [18,36], popupAnchor: [0,-40]
  });
}

MOSQUE_DATA.forEach(m => {
  const marker = L.marker([m.lat, m.lng], { icon: createIcon(m.jumat_berkah) }).addTo(map);
  markerMap[m.id] = marker;

  // Tooltip on hover
  marker.bindTooltip(
    `<span class="tt-name">${m.name}</span>
     <span class="${m.jumat_berkah ? 'tt-yes' : 'tt-no'}">${m.jumat_berkah ? '✅ Ada Jumat Berkah' : '🚫 Tidak Ada Jumat Berkah'}</span>`,
    { direction: 'top', offset: [0,-40], opacity: 1, className: 'mosque-tooltip', permanent: false }
  );

  // Popup — pre-bind, lazy content
  marker.bindPopup('', { maxWidth: 275, closeButton: true, className: 'mosque-popup' });
  marker.on('popupopen', function() {
    const p = this.getPopup();
    if (!p._built) { p.setContent(buildPopupHTML(m)); p._built = true; }
    setActiveCard(m.id);
  });
  marker.on('popupclose', clearActiveCard);
});

/* ══════════════════════════════════════════════════
   SIDEBAR CARD
   ══════════════════════════════════════════════════ */
function buildCard(m) {
  const hasJ   = m.jumat_berkah;
  const mapsLbl = platform === 'ios' ? 'Apple Maps' : 'Google Maps';
  return `
  <div class="mosque-card" id="card-${m.id}" onclick="focusMarker('${m.id}')">
    <div class="mc-img">
      ${m.photo_url
        ? `<img src="${m.photo_url}" alt="${m.name}" loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=\\'mc-ph\\'><span>🕌</span><small>Foto tidak tersedia</small></div>'" />`
        : `<div class="mc-ph"><span>🕌</span><small>Foto belum tersedia</small></div>`}
      <span class="mc-tag ${hasJ ? 'yes' : 'no'}">${hasJ ? '✅ Jumat Berkah' : '🚫 Tidak Ada'}</span>
    </div>
    <div class="mc-body">
      <div class="mc-name">${m.name}</div>
      <div class="mc-addr">📍 ${m.address}</div>
      <div class="mc-btn-row">
        <a href="${getMapsUrl(m)}" target="_blank" rel="noopener" class="mc-btn mc-btn-loc"
           onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>${mapsLbl}
        </a>
      </div>
    </div>
  </div>`;
}

function renderList(data) {
  const list = document.getElementById('mosque-list');
  const cnt  = document.getElementById('search-count');
  if (!data.length) {
    list.innerHTML = `<div class="no-results"><span>🔍</span>Masjid tidak ditemukan</div>`;
    cnt.textContent = '';
    return;
  }
  list.innerHTML = data.map(buildCard).join('');
  cnt.textContent = `${data.length} masjid ditemukan`;
}

function focusMarker(id) {
  const marker = markerMap[id];
  if (!marker) return;
  map.flyTo(marker.getLatLng(), Math.max(map.getZoom(), 15), { duration: .8 });
  setTimeout(() => marker.openPopup(), 860);
}

function setActiveCard(id) {
  document.querySelectorAll('.mosque-card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('card-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}
function clearActiveCard() {
  document.querySelectorAll('.mosque-card').forEach(c => c.classList.remove('active'));
}

/* ══════════════════════════════════════════════════
   SEARCH
   ══════════════════════════════════════════════════ */
function filterMosques(q) {
  const term = q.toLowerCase().trim();
  renderList(term ? MOSQUE_DATA.filter(m => m.name.toLowerCase().includes(term)) : MOSQUE_DATA);
}

/* ══════════════════════════════════════════════════
   GEOLOCATION
   ══════════════════════════════════════════════════ */
let userMarker = null;

function locateUser() {
  if (!navigator.geolocation) { showToast('📍 Browser tidak mendukung geolocation'); return; }
  const btn = document.getElementById('btn-geo');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Mencari…';

  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Lokasi Saya';
      const { latitude: lat, longitude: lng } = pos.coords;

      if (userMarker) map.removeLayer(userMarker);

      userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: '',
          html: `<div style="
            width:16px;height:16px;border-radius:50%;
            background:radial-gradient(circle,#4af,#06c);
            border:3px solid #fff;
            box-shadow:0 0 0 5px rgba(0,120,255,.2),0 2px 8px rgba(0,0,0,.3)
          "></div>`,
          iconSize: [16,16], iconAnchor: [8,8]
        }),
        zIndexOffset: 1000
      }).addTo(map);

      userMarker.bindTooltip('📍 Lokasi Anda', {
        permanent: false, direction: 'top', offset: [0,-10], className: 'mosque-tooltip'
      });

      map.flyTo([lat, lng], 15, { duration: 1.2 });
      showToast('📍 Lokasi ditemukan! Peta dipusatkan ke area Anda.');
    },
    err => {
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Lokasi Saya';
      const msg = err.code === 1 ? '🚫 Izin lokasi ditolak. Aktifkan di pengaturan browser.'
                : err.code === 2 ? '📡 Sinyal lokasi tidak tersedia, coba lagi.'
                                 : '⏱ Waktu habis, silakan coba lagi.';
      showToast(msg);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */
renderList(MOSQUE_DATA);
document.getElementById('count-badge').textContent = `${MOSQUE_DATA.length} Masjid`;
</script>
</body>
</html>
